[build]
  command = "npm run build"
  publish = "artifacts/cleanweb-agency/dist/public"
  functions = "artifacts/cleanweb-agency/netlify/functions"

[build.environment]
  PORT = "3000"
  BASE_PATH = "/"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/send-email"
  to = "/.netlify/functions/send-email"
  status = 200

[[redirects]]
  from = "/api/send-booking"
  to = "/.netlify/functions/send-booking"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
