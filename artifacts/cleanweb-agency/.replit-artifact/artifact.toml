kind = "web"
previewPath = "/"
title = "CleanWeb Agency"
version = "1.0.0"
id = "artifacts/cleanweb-agency"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19294

[services.development]
run = "pnpm --filter @workspace/cleanweb-agency run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cleanweb-agency", "run", "build" ]
publicDir = "artifacts/cleanweb-agency/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19294"
BASE_PATH = "/"
